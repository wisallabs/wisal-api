version: v2
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/apple/swift
    out: gen/swift
    opt:
      - Visibility=Public
  - remote: buf.build/connectrpc/swift
    out: gen/swift
    opt:
      - GenerateAsyncMethods=true
      - GenerateCallbackMethods=true
      - Visibility=Public
