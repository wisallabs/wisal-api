syntax = "proto3";

package wisal.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/wisallabs/api/gen/go/wisal/v1;wisalv1";

service AuthService {
  rpc SendOTP(SendOTPRequest) returns (SendOTPResponse);
  rpc VerifyOTP(VerifyOTPRequest) returns (VerifyOTPResponse);
}

service SocialService {
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc SearchChannels(SearchChannelsRequest) returns (SearchChannelsResponse);
  rpc GetMyChannels(GetMyChannelsRequest) returns (GetMyChannelsResponse);
  rpc SubscribeChannel(SubscribeChannelRequest) returns (SubscribeChannelResponse);

  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc GetChannelMessages(GetChannelMessagesRequest) returns (GetChannelMessagesResponse);

  rpc SyncAndSubscribe(SyncAndSubscribeRequest) returns (stream SyncAndSubscribeResponse);
}

message User {
  string email = 1;
  string name = 2;
  string bio = 3;
  string public_id = 4;
  string image = 5;
}

message SendOTPRequest {
  string email = 1;
}
message SendOTPResponse {}

message VerifyOTPRequest {
  string email = 1;
  string code = 2;
}
message VerifyOTPResponse {
  string token = 1;
  User user = 2;
}

message Channel {
  string id = 1;
  string public_id = 2;
  string name = 3;
  string description = 4;
  string image = 5;
  bool is_verified = 6;
  google.protobuf.Timestamp last_message_at = 7;

  bool is_owner = 8;
  bool is_subscribed = 9;
  int64 subscribers_count = 10;

  optional bool notifications_enabled = 11;
}

message CreateChannelRequest {
  string name = 1;
  string image = 2;
  string public_id = 3;
}
message CreateChannelResponse {
  string public_id = 1;
}

message GetChannelMessagesRequest {
  string channel_id = 1;
  int32 limit = 2;

  oneof pagination {
    int64 before_message_id = 3;
    int64 after_message_id = 4;
  }
}
message GetChannelMessagesResponse {
  repeated Message messages = 1;
}

message SearchChannelsRequest {
  string query = 1;
}
message SearchChannelsResponse {
  repeated Channel channels = 1;
}

message GetMyChannelsRequest {}
message GetMyChannelsResponse {
  repeated Channel channels = 1;
}

message SubscribeChannelRequest {
  string channel_id = 1;
}
message SubscribeChannelResponse {}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_VOICE = 2;
  MESSAGE_TYPE_IMAGE = 3;
  MESSAGE_TYPE_AUDIO = 4;
}
message Message {
  string chat_id = 1;
  int64 message_id = 2;
  optional string author_public_id = 3;
  optional int64 root_id = 4;
  optional int64 parent_id = 5;
  MessageType type = 6;
  optional string body = 7;
  optional string attachments = 8;
  int64 reply_count = 9;
  bool is_thread = 10;
  bool is_edited = 11;

  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message SendMessageRequest {
  string channel_id = 1;
  optional int64 root_id = 2;
  optional int64 parent_id = 3;
  MessageType type = 4;
  string body = 5;
}
message SendMessageResponse {
  Message message = 1;
}

message EditMessageRequest {
  string channel_id = 1;
  int64 message_id = 2;
  string body = 3;
}
message EditMessageResponse {
  Message message = 1;
}

enum UpdateType {
  UPDATE_TYPE_UNSPECIFIED = 0;
  UPDATE_TYPE_MESSAGE_NEW = 1;
  UPDATE_TYPE_MESSAGE_EDIT = 2;
  UPDATE_TYPE_MESSAGE_DELETE = 3;
  UPDATE_TYPE_REACTION_CHANGE = 4;
  UPDATE_TYPE_CHANNEL_UPDATE = 5;
  UPDATE_TYPE_CHANNEL_DELETE = 6;
}

message SyncAndSubscribeRequest {
  int64 last_known_seq = 1;
}
message SyncAndSubscribeResponse {
  Event event = 1;
}

message Event {
  optional int64 seq = 1;
  UpdateType type = 2;

  oneof payload {
    ChannelMessageNewPayload channel_message_new = 4;
    ChannelMessageEditPayload channel_message_edit = 5;
    ChannelMessageDeletePayload channel_message_delete = 6;
    ChannelEditPayload channel_edit = 7;
  }
}

message ChannelMessageNewPayload {
  string channel_id = 1;
  int64 message_id = 2;
  optional string body = 3;
}
message ChannelMessageEditPayload {
  string channel_id = 1;
  int64 message_id = 2;
  optional string body = 3;
}
message ChannelMessageDeletePayload {
  string channel_id = 1;
  int64 message_id = 2;
}
message ChannelEditPayload {
  string channel_id = 1;
  string name = 2;
  string description = 3;
  string image = 4;
}
